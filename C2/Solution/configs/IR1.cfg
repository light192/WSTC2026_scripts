configure terminal
hostname IR1
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
ip routing
!
interface Loopback0
 description ROUTER-ID
 ip address 10.255.80.1 255.255.255.255
 ip ospf 20 area 0
!
interface GigabitEthernet0/0
 description TO-CR1-G0/0
 ip address 10.80.0.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 ip nat inside
 no shutdown
interface GigabitEthernet0/1
 description TO-CR2-G0/3
 ip address 10.80.0.5 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 ip nat inside
 no shutdown
interface GigabitEthernet0/2
 description TO-IR2-G0/2
 ip address 10.80.0.17 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 ip nat inside
 no shutdown
interface GigabitEthernet0/3
 description WAN-TO-ISP1-G0/0
 ip address 203.0.113.2 255.255.255.252
 ip nat outside
 ip flow ingress
 ip flow egress
 no shutdown
!
ip route 10.80.0.0 255.255.0.0 Null0
ip route 198.51.100.80 255.255.255.248 Null0
ip access-list extended HQ-NAT
 deny ip 10.80.0.0 0.0.255.255 10.80.0.0 0.0.255.255
 deny ip 10.80.0.0 0.0.255.255 10.81.0.0 0.0.255.255
 deny ip 10.80.0.0 0.0.255.255 10.82.0.0 0.0.255.255
 deny ip 10.80.0.0 0.0.255.255 10.83.0.0 0.0.255.255
 permit ip 10.80.10.0 0.0.0.255 any
 permit ip 10.80.40.0 0.0.0.255 any
ip nat pool HQ-PAT-IR1 198.51.100.81 198.51.100.81 netmask 255.255.255.248
ip nat inside source list HQ-NAT pool HQ-PAT-IR1 overload
!
router ospf 20
 router-id 10.255.80.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
 default-information originate metric 10 metric-type 1
!
router bgp 65220
 bgp log-neighbor-changes
 neighbor 203.0.113.1 remote-as 65000
 neighbor 203.0.113.1 password Skill39@C2
 neighbor 203.0.113.1 timers 10 30
 network 10.80.0.0 mask 255.255.0.0
 network 198.51.100.80 mask 255.255.255.248
!
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
 deny any log
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
 deny any
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface Loopback0
ntp server 10.81.130.10
ntp source Loopback0
ip flow-export destination 10.81.130.10 2055
ip flow-export source Loopback0
ip flow-export version 9
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
