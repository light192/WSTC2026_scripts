configure terminal
hostname DS3
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
ip routing
vtp mode transparent
vlan 130
 name SERVICES
vlan 150
 name MGMT
vlan 999
 name NATIVE
spanning-tree mode mst
spanning-tree mst configuration
 name AURORA-C2
 revision 2
 instance 3 vlan 130,150
 exit
spanning-tree mst 3 root primary
interface GigabitEthernet0/0
 description ROUTED-TO-IR3-G0/0
 no switchport
 ip address 10.81.0.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 20
 no shutdown
interface GigabitEthernet0/1
 description TRUNK-TO-DS4-G0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 130,150,999
 switchport nonegotiate
 no shutdown
interface GigabitEthernet0/2
 description ACCESS-SVR1-OPS
 switchport mode access
 switchport access vlan 130
 spanning-tree portfast
 spanning-tree bpduguard enable
 no cdp enable
 no shutdown
interface Loopback0
 ip address 10.255.81.11 255.255.255.255
 ip ospf 20 area 20
track 1 interface GigabitEthernet0/0 line-protocol
interface Vlan130
 ip address 10.81.130.11 255.255.255.0
 ip ospf 20 area 20
 standby 130 ip 10.81.130.1
 standby 130 priority 120
 standby 130 preempt
 standby 130 track 1 decrement 30
 no shutdown
interface Vlan150
 ip address 10.81.150.11 255.255.255.0
 ip ospf 20 area 20
 standby 150 ip 10.81.150.1
 standby 150 priority 120
 standby 150 preempt
 standby 150 track 1 decrement 30
 no shutdown
router ospf 20
 router-id 10.255.81.11
 passive-interface default
 no passive-interface GigabitEthernet0/0
 area 20 stub
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface Loopback0
ntp server 10.81.130.10
ntp source Loopback0
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
