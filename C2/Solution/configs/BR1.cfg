configure terminal
hostname BR1
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
ip routing
interface Loopback0
 description ROUTER-ID-MANAGEMENT
 ip address 10.255.82.1 255.255.255.255
interface GigabitEthernet0/0
 description WAN-TO-ISP1-G0/3
 ip address 203.0.113.14 255.255.255.252
 ip nat outside
 ip flow ingress
 ip flow egress
 no shutdown
interface GigabitEthernet0/1
 description DOT1Q-TRUNK-TO-AS3-G0/0
 no ip address
 no shutdown
interface GigabitEthernet0/1.110
 description BR1-USERS
 encapsulation dot1Q 110
 ip address 10.82.10.1 255.255.255.0
 ip helper-address 10.81.130.10
 ip access-group BR1-USERS-IN in
 ip nat inside
interface GigabitEthernet0/1.150
 description BR1-MANAGEMENT
 encapsulation dot1Q 150
 ip address 10.82.50.1 255.255.255.0
 ip nat inside
interface GigabitEthernet0/1.999
 description NATIVE-VLAN
 encapsulation dot1Q 999 native
 no ip address
ip route 10.82.0.0 255.255.0.0 Null0
ip access-list extended BR1-PAT
 deny ip 10.82.0.0 0.0.255.255 10.80.0.0 0.0.255.255
 deny ip 10.82.0.0 0.0.255.255 10.81.0.0 0.0.255.255
 deny ip 10.82.0.0 0.0.255.255 10.82.0.0 0.0.255.255
 deny ip 10.82.0.0 0.0.255.255 10.83.0.0 0.0.255.255
 permit ip 10.82.10.0 0.0.0.255 any
ip nat inside source list BR1-PAT interface GigabitEthernet0/0 overload
ip access-list extended BR1-USERS-IN
 permit udp any eq bootpc any eq bootps
 permit udp 10.82.10.0 0.0.0.255 host 10.81.130.10 eq domain
 permit udp 10.82.10.0 0.0.0.255 host 10.81.130.10 eq ntp
 permit icmp 10.82.10.0 0.0.0.255 host 10.81.130.10
 deny ip 10.82.10.0 0.0.0.255 host 10.81.130.10
 deny tcp 10.82.10.0 0.0.0.255 10.0.0.0 0.255.255.255 eq 22
 permit ip 10.82.10.0 0.0.0.255 any
router bgp 65241
 bgp log-neighbor-changes
 neighbor 203.0.113.13 remote-as 65000
 neighbor 203.0.113.13 password Skill39@C2
 neighbor 203.0.113.13 timers 10 30
 network 10.82.0.0 mask 255.255.0.0
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface GigabitEthernet0/1.150
ntp server 10.81.130.10
ntp source GigabitEthernet0/1.150
ip flow-export destination 10.81.130.10 2055
ip flow-export source Loopback0
ip flow-export version 9
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
