configure terminal
hostname DS1
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
ip routing
vtp mode transparent
vtp domain CAMP-C2
vlan 10
 name STAFF
vlan 40
 name GUEST
vlan 50
 name MGMT
vlan 998
 name UNUSED
vlan 999
 name NATIVE
spanning-tree mode mst
spanning-tree mst configuration
 name AURORA-C2
 revision 2
 instance 1 vlan 10,50
 instance 2 vlan 40
 exit
spanning-tree mst 1 root primary
spanning-tree mst 2 root secondary
interface range GigabitEthernet1/0-1
 description LACP-MEMBER-TO-DS2
 channel-group 12 mode active
 no shutdown
interface Port-channel12
 description LACP-TRUNK-TO-DS2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport nonegotiate
 ip dhcp snooping trust
 ip arp inspection trust
interface range GigabitEthernet1/2-3
 description UNUSED-SHUTDOWN
 switchport mode access
 switchport access vlan 998
 shutdown
interface GigabitEthernet0/1
 description TRUNK-TO-AS1-G0/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport nonegotiate
 ip dhcp snooping trust
 ip arp inspection trust
 no shutdown
interface GigabitEthernet0/2
 description TRUNK-TO-AS2-G0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport nonegotiate
 ip dhcp snooping trust
 ip arp inspection trust
 no shutdown
interface GigabitEthernet0/0
 description ROUTED-TO-CR1-G0/1
 no switchport
 ip address 10.80.0.26 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 no shutdown
interface GigabitEthernet0/3
 description ROUTED-TO-CR2-G0/4
 no switchport
 ip address 10.80.0.34 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 no shutdown
interface Loopback0
 description ROUTER-ID
 ip address 10.255.80.21 255.255.255.255
 ip ospf 20 area 0
track 1 interface GigabitEthernet0/0 line-protocol
track 2 interface GigabitEthernet0/3 line-protocol
interface Vlan10
 description STAFF-GATEWAY
 ip address 10.80.10.11 255.255.255.0
 ip helper-address 10.81.130.10
 ip access-group STAFF-IN in
 ip ospf 20 area 10
 standby 10 ip 10.80.10.1
 standby 10 priority 120
 standby 10 preempt
 standby 10 track 1 decrement 15
 standby 10 track 2 decrement 15
 no shutdown
interface Vlan40
 description GUEST-GATEWAY
 ip address 10.80.40.11 255.255.255.0
 ip helper-address 10.81.130.10
 ip access-group GUEST-IN in
 ip ospf 20 area 10
 standby 40 ip 10.80.40.1
 standby 40 priority 100
 standby 40 preempt
 standby 40 track 1 decrement 15
 standby 40 track 2 decrement 15
 no shutdown
interface Vlan50
 description HQ-MANAGEMENT
 ip address 10.80.50.11 255.255.255.0
 ip ospf 20 area 10
 standby 50 ip 10.80.50.1
 standby 50 priority 120
 standby 50 preempt
 standby 50 track 1 decrement 15
 standby 50 track 2 decrement 15
 no shutdown
ip dhcp snooping
ip dhcp snooping vlan 10,40
ip arp inspection vlan 10,40
ip access-list extended STAFF-IN
 permit udp any eq bootpc any eq bootps
 permit udp 10.80.10.0 0.0.0.255 host 10.81.130.10 eq domain
 permit udp 10.80.10.0 0.0.0.255 host 10.81.130.10 eq ntp
 permit icmp 10.80.10.0 0.0.0.255 host 10.81.130.10
 deny ip 10.80.10.0 0.0.0.255 host 10.81.130.10
 deny tcp 10.80.10.0 0.0.0.255 10.0.0.0 0.255.255.255 eq 22
 permit ip 10.80.10.0 0.0.0.255 any
ip access-list extended GUEST-IN
 permit udp any eq bootpc any eq bootps
 permit udp 10.80.40.0 0.0.0.255 host 10.81.130.10 eq domain
 permit udp 10.80.40.0 0.0.0.255 host 10.81.130.10 eq ntp
 permit icmp 10.80.40.0 0.0.0.255 host 10.81.130.10
 deny ip 10.80.40.0 0.0.0.255 10.0.0.0 0.255.255.255
 permit ip 10.80.40.0 0.0.0.255 any
router ospf 20
 router-id 10.255.80.21
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/3
 area 10 range 10.80.0.0 255.255.0.0
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface Loopback0
ntp server 10.81.130.10
ntp source Loopback0
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
