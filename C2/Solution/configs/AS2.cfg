configure terminal
hostname AS2
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
no ip routing
vtp mode transparent
vtp domain CAMP-C2
vlan 10
 name STAFF
vlan 40
 name GUEST
vlan 50
 name MGMT
vlan 998
 name UNUSED
vlan 999
 name NATIVE
spanning-tree mode mst
spanning-tree mst configuration
 name AURORA-C2
 revision 2
 instance 1 vlan 10,50
 instance 2 vlan 40
 exit
interface GigabitEthernet0/0
 description TRUNK-TO-DS2-G0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport nonegotiate
 ip dhcp snooping trust
 ip arp inspection trust
 no shutdown
interface GigabitEthernet0/1
 description TRUNK-TO-DS1-G0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport nonegotiate
 ip dhcp snooping trust
 ip arp inspection trust
 no shutdown
interface GigabitEthernet0/2
 description ACCESS-PC2-GUEST
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 spanning-tree bpduguard enable
 switchport port-security
 switchport port-security maximum 2
 switchport port-security mac-address sticky
 switchport port-security violation restrict
 no cdp enable
 no shutdown
interface GigabitEthernet0/3
 description UNUSED-SHUTDOWN
 switchport mode access
 switchport access vlan 998
 shutdown
interface range GigabitEthernet1/0-3
 description UNUSED-SHUTDOWN
 switchport mode access
 switchport access vlan 998
 shutdown
interface Vlan50
 description SWITCH-MANAGEMENT
 ip address 10.80.50.22 255.255.255.0
 no shutdown
ip default-gateway 10.80.50.1
ip dhcp snooping
ip dhcp snooping vlan 10,40
ip arp inspection vlan 10,40
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface Vlan50
ntp server 10.81.130.10
ntp source Vlan50
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
