configure terminal
hostname IR3
ip domain name camp-c2.local
clock timezone ALMT 5 0
service timestamps log datetime msec
enable secret Skill39@C2
username admin privilege 15 secret Skill39@C2
ip ssh version 2
ip routing
interface Loopback0
 description ROUTER-ID
 ip address 10.255.81.1 255.255.255.255
 ip ospf 20 area 0
interface GigabitEthernet0/0
 description TO-DS3-G0/0
 ip address 10.81.0.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 20
 ip nat inside
 no shutdown
interface GigabitEthernet0/1
 description TO-DS4-G0/0
 ip address 10.81.0.5 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 20
 ip nat inside
 no shutdown
interface GigabitEthernet0/2
 description PRIVATE-TRANSIT-TO-IR2-G0/4
 ip address 10.80.0.42 255.255.255.252
 ip ospf network point-to-point
 ip ospf 20 area 0
 ip nat inside
 no shutdown
interface GigabitEthernet0/3
 description WAN-TO-ISP1-G0/2
 ip address 203.0.113.10 255.255.255.252
 ip nat outside
 ip flow ingress
 ip flow egress
 no shutdown
ip route 10.81.0.0 255.255.0.0 Null0
ip route 198.51.100.88 255.255.255.248 Null0
ip nat inside source static tcp 10.81.130.10 80 198.51.100.89 80 extendable
router ospf 20
 router-id 10.255.81.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
 area 20 stub no-summary
 area 20 range 10.81.0.0 255.255.0.0
router bgp 65230
 bgp log-neighbor-changes
 neighbor 203.0.113.9 remote-as 65000
 neighbor 203.0.113.9 password Skill39@C2
 neighbor 203.0.113.9 timers 10 30
 network 10.81.0.0 mask 255.255.0.0
 network 198.51.100.88 mask 255.255.255.248
ip access-list standard VTY-SOURCES
 permit host 10.81.150.10
 permit 10.80.50.0 0.0.0.255
 permit 10.81.150.0 0.0.0.255
 permit 10.82.50.0 0.0.0.255
 permit 10.83.50.0 0.0.0.255
ip access-list standard SNMP-MANAGERS
 permit host 10.81.130.10
 permit host 10.81.150.10
snmp-server group C2 v3 priv access SNMP-MANAGERS
snmp-server user c2snmp C2 v3 auth sha C2Auth@2026 priv aes 128 C2Priv@2026
logging host 10.81.130.10
logging trap warnings
logging source-interface Loopback0
ntp server 10.81.130.10
ntp source Loopback0
ip flow-export destination 10.81.130.10 2055
ip flow-export source Loopback0
ip flow-export version 9
line vty 0 15
 login local
 transport input ssh
 access-class VTY-SOURCES in
crypto key generate rsa modulus 2048
end
copy running-config startup-config
